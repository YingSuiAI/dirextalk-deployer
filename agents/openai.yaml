display_name: Dirextalk Deployer
short_description: Operate, verify, recover, or destroy a production Dirextalk AWS node and its local bridge.
default_prompt: Use $dirextalk-deployer for this Dirextalk deployment operation.
entrypoint: ../SKILL.md
runtime_notes:
  - Use this skill for operations, not ordinary repository development or review.
  - Keep the installed package and execution source unchanged during an operation unless the user explicitly requests an update.
  - Use POSIX scripts on POSIX hosts and PowerShell wrappers on Windows; treat WSL as a separate POSIX runtime.
  - Install only the pinned independent updater and immutable stable message-server image selected by the deployer.
  - Dirextalk MCP is the deployed server's bearer-authenticated HTTP endpoint; do not create a local MCP service or generic fallback.
  - Read only the reference required by the selected deployment, runtime-wiring, verification, recovery, or destroy phase.
