display_name: Dirextalk Deployer
short_description: Deploy, resume, verify, destroy, and wire dirextalk-connect plus capability-driven remote HTTP MCP for a production Dirextalk message server on AWS.
default_prompt: Deploy a Dirextalk message server using my production domain, following SKILL.md and scripts/orchestrate.sh.
entrypoint: ../SKILL.md
runtime_notes:
  - Read SKILL.md before running deployment commands.
  - When installing or updating this skill itself, read references/agent-targets.md and use the npm-managed global skill install by default.
  - Do not clone the GitHub repository to install or use the skill unless the user explicitly asks for deployer development, local patching, or a project-local install.
  - On POSIX use scripts/orchestrate.sh and scripts/destroy.sh; on Windows use the PowerShell wrappers.
  - S6 writes service-scoped credentials, dirextalk-connect config, and explicit MCP capability/artifact state; it does not write retired or unconsumed env files.
  - Antigravity, Cursor, iFlow, and every detected OpenClaw or Hermes host are host-managed; Devin, Pi, Reasonix, and tmux are unsupported. Unknown runtimes fail closed without a generic artifact.
  - OpenClaw and Hermes keep MCP in native registries and must pass service-scoped secret-free live probes before the ACP bridge starts; never mutate their real user config automatically.
  - S6 never mutates OpenClaw's global MCP config.
  - The instructions are compatible with Claude, Codex/OpenAI, Gemini, Cursor, Copilot, OpenClaw, Hermes, and other shell-capable agent runtimes.
