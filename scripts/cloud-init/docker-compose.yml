# docker-compose.yml - cloud-side Dirextalk message-server stack.
#
# Layers: Caddy (public 443/TLS) -> Dirextalk message-server (Matrix + Dirextalk API).
# PostgreSQL 18 persists Matrix and Dirextalk business tables. The local agent bridge
# process is not started in the cloud by default.

networks:
  dirextalk-net:

volumes:
  postgres-data:
  message-config:
  message-data:
  caddy-data:
  caddy-config:

services:
  postgres:
    image: postgres:18-alpine
    networks: [dirextalk-net]
    environment:
      POSTGRES_USER: dirextalk_message_server
      POSTGRES_PASSWORD: dirextalk_message_server
      POSTGRES_DB: dirextalk_message_server
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dirextalk_message_server -d dirextalk_message_server"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  message-init:
    image: ${MESSAGE_SERVER_IMAGE}
    networks: [dirextalk-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TURN_SECRET: ${TURN_SECRET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /etc/dirextalk-message-server /var/dirextalk-message-server /var/dirextalk-message-server/p2p
        if [ ! -f /etc/dirextalk-message-server/matrix_key.pem ]; then
          /usr/bin/generate-keys -private-key /etc/dirextalk-message-server/matrix_key.pem
        fi
        CFG=/etc/dirextalk-message-server/message-server.yaml
        DB="postgres://dirextalk_message_server:dirextalk_message_server@postgres/dirextalk_message_server?sslmode=disable"
        /usr/bin/generate-config -dir /var/dirextalk-message-server -db "$$DB" -server "${DOMAIN}" > "$$CFG"
        printf '\nclient_api:\n  turn:\n    turn_shared_secret: "%s"\n    turn_user_lifetime: "24h"\n    turn_uris:\n      - "turn:%s:3478?transport=udp"\n      - "turn:%s:3478?transport=tcp"\n' "$$TURN_SECRET" "${DOMAIN}" "${DOMAIN}" >> "$$CFG"
    volumes:
      - message-config:/etc/dirextalk-message-server
      - message-data:/var/dirextalk-message-server
    restart: "no"

  message-server:
    image: ${MESSAGE_SERVER_IMAGE}
    networks: [dirextalk-net]
    depends_on:
      postgres:
        condition: service_healthy
      message-init:
        condition: service_completed_successfully
    environment:
      P2P_PORTAL_CREDENTIALS_FILE: /var/dirextalk-message-server/p2p/bootstrap.json
      P2P_PORTAL_PASSWORD: ${P2P_PORTAL_PASSWORD}
    command:
      - --config
      - /etc/dirextalk-message-server/message-server.yaml
      - --http-bind-address
      - :8008
    volumes:
      - message-config:/etc/dirextalk-message-server
      - message-data:/var/dirextalk-message-server
      - /var/dirextalk-message-server/p2p:/var/dirextalk-message-server/p2p
      - /run/dirextalk-updater:/run/dirextalk-updater:ro
      - /etc/dirextalk-updater/control-token:/etc/dirextalk-updater/control-token:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8008/_p2p/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  caddy:
    image: caddy:2
    networks: [dirextalk-net]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /run/dirextalk-updater:/run/dirextalk-updater:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    restart: unless-stopped
    command:
      - -n
      - --realm=${DOMAIN}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --external-ip=${PUBLIC_IP}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --no-cli
      - --no-tls
      - --no-dtls
      - --no-multicast-peers
      - --denied-peer-ip=10.0.0.0-10.255.255.255
      - --denied-peer-ip=172.16.0.0-172.31.255.255
      - --denied-peer-ip=192.168.0.0-192.168.255.255
