#cloud-config
# user-data.yaml - runs once on first EC2 boot as cloud-init user-data.
#
# Flow: install Docker -> write deployment files -> generate local secrets ->
# docker compose up -> wait for message-server bootstrap credentials.

package_update: false
package_upgrade: false

write_files:
  - path: /var/dirextalk-message-server/.env
    permissions: '0600'
    content: |
      DOMAIN=__DOMAIN__
      ACME_EMAIL=__ACME_EMAIL__
      MESSAGE_SERVER_IMAGE=__MESSAGE_SERVER_IMAGE__

runcmd:
  - |
    grep -q '^TURN_SECRET=' /var/dirextalk-message-server/.env || \
      echo "TURN_SECRET=$(head -c 32 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 40)" >> /var/dirextalk-message-server/.env
    grep -q '^P2P_PORTAL_PASSWORD=' /var/dirextalk-message-server/.env || \
      echo "P2P_PORTAL_PASSWORD=$(od -An -N4 -tu4 /dev/urandom | awk '{printf "%08d", $1 % 100000000}')" >> /var/dirextalk-message-server/.env
  - |
    if ! command -v docker >/dev/null 2>&1; then
      curl -fsSL https://get.docker.com | sh
    fi
  - systemctl enable --now docker
  - bash /var/dirextalk-message-server/updater/bootstrap-host.sh
